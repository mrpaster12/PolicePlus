# Police Plugin Configuration
# تنظیمات پلاگین پلیس
# Notes:
# - Values are hot-reloadable only if your admin tools reload configs correctly; otherwise restart the server.
# - Time units: ticks = 1/20 second. 20 ticks ≈ 1 second.
# نکات:
# - مقادیر فقط در صورتی داغ‌بارگذاری می‌شوند که ابزار مدیریت شما این کار را پشتیبانی کند؛ در غیر این صورت سرور را ری‌استارت کنید.
# - واحد زمان: هر tick معادل 1/20 ثانیه است. 20 تیک ≈ 1 ثانیه.

# Language settings / تنظیمات زبان
# Choose the language file from resources/languages (without .yml extension)
# زبان فایل را از مسیر resources/languages انتخاب کنید (بدون پسوند .yml)
language: "en" # en = English, fa = Persian/Finglish / en = انگلیسی، fa = فارسی/فینگلیش

# Wanted system settings / تنظیمات سیستم وانتد
# Controls how wanted levels are assigned and their limits
# تنظیم می‌کند سطح‌های وانتد چگونه اعمال شوند و حد بالای آن‌ها
wanted:
  max_wanted_level: 5 # Maximum wanted level / حداکثر سطح وانتد
  wanted_on_kill: true # Add wanted on player kills / اضافه کردن وانتد با کشتن بازیکن
  wanted_level_per_kill: 1 # Amount added per kill / میزان اضافه‌شده برای هر کشتن
  # Reset wanted level on player death / ریست شدن وانتد هنگام مرگ
  reset_on_death:
    enabled: false # اگر true باشد، هنگام مرگ سطح وانتد ممکن است ریست شود
    # اگر مقدار منفی باشد (مثلاً -1) همیشه ریست می‌شود
    # در غیر این صورت فقط اگر سطح وانتد بازیکن <= این مقدار باشد ریست می‌شود
    max_level_to_reset: 3
  
# Jail system settings / تنظیمات سیستم زندان
# Determines jail durations and arrest rules
# مدت‌زمان زندان و قوانین دستگیری را تعیین می‌کند
jail:
  jail_time_per_wanted: 5 # Minutes per wanted level / دقیقه برای هر سطح وانتد
  max_jail_time: 60 # Max jail time (minutes) / حداکثر زمان زندان (دقیقه)
  arrest_distance: 10 # Max distance to arrest (blocks) / حداکثر فاصله دستگیری (بلاک)
  clear_wanted_on_release: true # Clear wanted on release / پاک شدن وانتد بعد از آزادی
  default_jail_radius: 10 # Restricted radius around jail / شعاع محدودیت اطراف زندان
  
# Compass settings / تنظیمات قطب‌نما
# Update interval affects performance: lower = smoother updates but more CPU
# فاصله به‌روزرسانی روی عملکرد اثر دارد: کمتر = روان‌تر اما مصرف CPU بیشتر
compass:
  update_interval: 20 # Ticks between updates (20 = ~1s) / فاصله به‌روزرسانی (20 ≈ 1ث)
  max_distance: 10000 # Max shown distance / حداکثر فاصله نمایش
  
# Handcuff settings / تنظیمات دستبند
handcuff:
  # Display name for handcuff item / نام نمایشی آیتم دستبند
  name: "cuff"
  # Lore text for handcuff item / متن لور آیتم دستبند
  lore: "cuff"
  # Color code for name (e.g. &a green) / کد رنگ نام (مثلاً &a سبز)
  name_color: "&a"
  # Make name bold (true/false) / بولد کردن نام (true/false)
  name_bold: true
  # Maximum cuff time in seconds / حداکثر مدت دستبند به ثانیه
  max_time: 300
  # If true, any item with this material works even without name/tag / اگر true باشد، هر آیتم با همین متریال حتی بدون نام/تگ هم به عنوان دستبند پذیرفته می‌شود
  accept_plain_item: true

# Display settings / تنظیمات نمایش (Tablist/BelowName)
# Controls player list suffixes and below-name numbers
# مدیریت پسوند نام بازیکن در لیست و عدد زیر نام
display:
  enabled: true
  mode: stars # stars | number / ستاره‌ای | عددی
  stars:
    symbol: "★" # You can change (e.g. ✪ * •) / قابل تغییر
    filled_color: "&6" # Filled star color / رنگ ستاره پر
    empty_color: "&7" # Empty star color / رنگ ستاره خالی
  tablist:
    enabled: true
    format_stars: " &7[&e{stars}&7]" # {stars} replaced with stars / {stars} جایگزین می‌شود
    format_number: " &7[&e{level}&7]" # {level} replaced with number / {level} جایگزین می‌شود
  below_name:
    enabled: true
    objective: "wantedLevel" # Scoreboard objective name / نام آبجکتیو
    title: "&eWanted" # Display title / عنوان نمایش
